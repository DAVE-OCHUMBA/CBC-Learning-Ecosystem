server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/manifest+json;

    # ── Security Headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow self + M-Pesa callbacks + Africa's Talking
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.safaricom.co.ke https://api.africastalking.com; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:;" always;

    # ── PWA: Service Worker — must be served from root with no-cache ───────────
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # ── PWA: Manifest ──────────────────────────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Static Assets: long-lived cache (Vite fingerprints filenames) ──────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Offline Page ───────────────────────────────────────────────────────────
    location = /offline.html {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Health check for Railway/Render ───────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA: Catch-all — serve index.html for React Router ────────────────────
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
